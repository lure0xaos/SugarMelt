[versions]
javaVersion = "22"
org-jetbrains-kotlin = "2.3.21"
org-jetbrains-kotlin-wrappers-kotlin-wrappers = "2026.5.5"
de-comahe-i18n4k = "0.11.2"
nl-astraeus-kotlin-css-generator = "1.1.0"

[plugins]
