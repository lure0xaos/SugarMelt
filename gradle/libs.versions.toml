org-jetbrains-kotlin-wrappers-kotlin-browser = { module = "org.jetbrains.kotlin-wrappers:kotlin-browser" }
org-jetbrains-kotlin-wrappers-kotlin-web = { module = "org.jetbrains.kotlin-wrappers:kotlin-web" }
de-comahe-i18n4k-i18n4k-core = { module = "de.comahe.i18n4k:i18n4k-core", version.ref = "de-comahe-i18n4k" }
